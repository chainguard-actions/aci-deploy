name: Test basic deploy inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          resource-group: my-resource-group
          dns-name-label: my-container-dns
          image: nginx:latest
          location: eastus
          name: my-container-group
          ports: '80'
          os-type: Linux
          cpu: 1
          memory: 1.5
          ip-address: Public
          restart-policy: Always
      - name: Assert action ran (credentials expected to fail)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # Without Azure credentials the action is expected to fail.
          # We only verify it was invoked (outcome is set, not skipped).
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action step was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked (outcome=$OUTCOME)"
