name: Test ACI deploy with log analytics inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify action.yml exists
        run: |
          if [ ! -f action.yml ]; then
            echo "FAIL: action.yml not found"
            exit 1
          fi
          echo "PASS: action.yml found"
      - id: action
        uses: .
        continue-on-error: true
        with:
          resource-group: test-resource-group
          dns-name-label: test-dns-label-logs
          image: nginx:latest
          location: westus
          name: test-container-logs
          log-analytics-workspace: test-workspace-id
          log-analytics-workspace-key: test-workspace-key
          log-type: ContainerInsights
          ports: '80'
          os-type: Linux
          cpu: 1
          memory: 1.5
          ip-address: Public
          protocol: TCP
          restart-policy: Always
      - name: Assert action ran (may fail due to missing Azure credentials)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "Action outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action executed (outcome: $OUTCOME)"
